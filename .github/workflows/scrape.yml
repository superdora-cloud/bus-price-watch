name: Scrape Bus Prices

on:
  schedule:
    # 日付別スクレイパー: 週3回（月・水・金）JST 10:00 (UTC 1:00)
    - cron: "0 2 * * 1,3,5"
  workflow_dispatch:
    # 手動実行も可能
    inputs:
      routes_limit:
        description: "処理する区間数を制限（空欄=全区間。デバッグ時は 1 など）"
        required: false
        type: string
      days_limit:
        description: "処理する日数を制限（空欄=60日。デバッグ時は 1 など）"
        required: false
        type: string

permissions:
  contents: write  # CSV/JSON コミットのため

jobs:
  # ── 日付別スクレイパー（夜行便のみ、週3回: 月・水・金）──
  scrape-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run daily scraper
        run: python scraper/scrape_daily.py
        env:
          ROUTES_LIMIT: ${{ github.event.inputs.routes_limit }}
          DAYS_LIMIT: ${{ github.event.inputs.days_limit }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/daily_prices.csv docs/daily_data.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_prices.csv docs/daily_data.json
          git commit -m "chore: update daily prices $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No data changes detected. Skipping commit."
